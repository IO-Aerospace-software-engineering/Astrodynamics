name: Astrodynamics CI

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "develop", "release/*", "hotfix/*" ]
  workflow_dispatch:
    inputs:
          logLevel:
            description: 'Log level'
            required: true
            default: 'minimal'
            type: choice
            options:
            - minimal
            - normal
            - detailed
            - diagnostic

env:
  BUILD_TYPE: Release

jobs:
  # Job 1: Build and test C++ native library on all platforms.
  # Both macOS arches build on the Apple Silicon runner: arm64 natively, x64 by
  # cross-compiling (GitHub's Intel macOS runners are retired/capacity-starved).
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-14        # Apple Silicon — native arm64
            osx_arch: arm64
            osx_cc_arch: arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64 -DOSX_ARCH=arm64
          - os: macos-14        # Apple Silicon — cross-compiled x64
            osx_arch: x64
            osx_cc_arch: x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DOSX_ARCH=x86_64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # SOFA has no prebuilt macOS archive: compile it from vendored source (for the
    # target arch) into the static lib the CMake APPLE branch links.
    - name: Build SOFA (macOS)
      if: matrix.osx_arch
      run: |
        cd external-lib/sofa-src
        # Compile library routines only; skip any t_*.c test drivers (they define main()).
        cc -arch ${{ matrix.osx_cc_arch }} -O2 -c $(ls *.c | grep -v '^t_')
        ar rcs ../libsofa_c_osx_${{ matrix.osx_arch }}.a *.o

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{ matrix.cmake_extra }}

    - name: Build C++
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 2

    - name: C++ Tests (Linux)
      working-directory: ${{github.workspace}}/build/IO.Astrodynamics.Tests
      run: ./IO.Astrodynamics.Tests
      if: matrix.os == 'ubuntu-latest'

    # Only the native arm64 build runs its tests; the x64 dylib is cross-compiled
    # (can't execute natively here) and is covered by the Linux/Windows x64 tests.
    - name: C++ Tests (macOS arm64)
      working-directory: ${{github.workspace}}/build/IO.Astrodynamics.Tests
      run: ./IO.Astrodynamics.Tests
      if: matrix.osx_arch == 'arm64'

    - name: C++ Tests (Windows)
      working-directory: ${{github.workspace}}\build\IO.Astrodynamics.Tests\Release
      shell: cmd
      run: IO.Astrodynamics.Tests.exe
      if: matrix.os == 'windows-latest'

    - name: Upload native library (Linux)
      uses: actions/upload-artifact@v4
      with:
        name: native-linux
        path: build/IO.Astrodynamics/libIO.Astrodynamics.so
        retention-days: 1
      if: matrix.os == 'ubuntu-latest'

    - name: Upload native library (macOS)
      uses: actions/upload-artifact@v4
      with:
        name: native-osx-${{ matrix.osx_arch }}
        path: build/IO.Astrodynamics/libIO.Astrodynamics.dylib
        retention-days: 1
      if: matrix.osx_arch

    - name: Upload native library (Windows)
      uses: actions/upload-artifact@v4
      with:
        name: native-windows
        path: |
          build/IO.Astrodynamics/Release/IO.Astrodynamics.dll
          build/IO.Astrodynamics/Release/IO.Astrodynamics.lib
        retention-days: 1
      if: matrix.os == 'windows-latest'

  # Job 2: Build and test .NET with freshly built native libraries.
  # macOS runs on Apple Silicon only — the arm64 .NET host can load the arm64
  # dylib; the x64 dylib is validated by the Linux/Windows x64 .NET jobs.
  build-dotnet:
    needs: build-native
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-14        # Apple Silicon (arm64)
            osx_arch: arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./IO.Astrodynamics.Net

    steps:
    - uses: actions/checkout@v4

    - name: Download native Linux library
      uses: actions/download-artifact@v4
      with:
        name: native-linux
        path: IO.Astrodynamics.Net/IO.Astrodynamics/resources
      if: matrix.os == 'ubuntu-latest'

    - name: Download native Windows library
      uses: actions/download-artifact@v4
      with:
        name: native-windows
        path: IO.Astrodynamics.Net/IO.Astrodynamics/resources
      if: matrix.os == 'windows-latest'

    # The resolver loads resources/libIO.Astrodynamics.dylib for the from-source build.
    - name: Download native macOS library
      uses: actions/download-artifact@v4
      with:
        name: native-osx-${{ matrix.osx_arch }}
        path: IO.Astrodynamics.Net/IO.Astrodynamics/resources
      if: matrix.osx_arch

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Test
      run: dotnet test --verbosity ${{ inputs.logLevel || 'minimal' }} -c Release
